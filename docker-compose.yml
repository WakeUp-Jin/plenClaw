services:
  pineclaw:
    build: .
    container_name: pineclaw
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PINECLAW_HOME=/root/.pineclaw
    volumes:
      - pineclaw-shared:/root/.pineclaw

  tiangong:
    build:
      context: .
      dockerfile: docker/tiangong.Dockerfile
    container_name: tiangong
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pineclaw-shared:/shared

volumes:
  pineclaw-shared:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.pineclaw
